  <text x="120" y="430" font-family="'Black Han Sans', Pretendard, sans-serif" font-size="120" font-weight="900" fill="#ffffff" letter-spacing="-2">모두의 마라톤</text>
  <text x="124" y="500" font-family="Pretendard, -apple-system, sans-serif" font-size="38" font-weight="600" fill="#ffffff" opacity="0.95">혼자 뛰면 운동, 같이 뛰면 추억 · 러닝·마라톤 크루 + 기록</text>
